<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village List — Raipur (002) · CMMS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #ffffff;
    --navy-mid: #f4f6fa;
    --navy-card: #ffffff;
    --border: #d0dbe8;
    --accent: #c97d00;
    --accent2: #c04b0e;
    --teal: #007a7a;
    --blue: #1a6fbf;
    --white: #1a2a3a;
    --muted: #5a6e85;
    --success: #009965;
    --pending: #b03060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--white); font-family: 'IBM Plex Sans', sans-serif; font-size: 13.5px; min-height: 100vh; }

  header { background: linear-gradient(90deg, #f8f9fc 0%, #eef1f8 60%, #f8f9fc 100%); border-bottom: 2px solid var(--accent); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .h-left { display: flex; align-items: center; gap: 14px; }
  .emblem { width: 46px; height: 46px; background: conic-gradient(from 0deg, #f4a300, #e05c1a, #f4a300); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 16px rgba(244,163,0,0.35); flex-shrink: 0; }
  .h-text h1 { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: 0.07em; text-transform: uppercase; }
  .h-text p { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .user-chip { background: rgba(0,0,0,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 11px; color: var(--teal); font-family: 'IBM Plex Mono', monospace; }

  .breadcrumb { background: var(--navy-mid); border-bottom: 1px solid var(--border); padding: 8px 28px; font-size: 11px; color: var(--muted); display: flex; gap: 7px; align-items: center; }
  .breadcrumb b { color: var(--accent); font-weight: 500; }
  .breadcrumb .sep { color: var(--border); }

  main { padding: 26px 28px 48px; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
  .stat-card { background: #ffffff; border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: default; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.s1::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-card.s2::before { background: linear-gradient(90deg, #b03060, #c04b0e); }
  .stat-card.s3::before { background: linear-gradient(90deg, var(--success), #006e45); }
  .stat-card.s4::before { background: linear-gradient(90deg, var(--blue), #1a5fa0); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 500; margin-top: 6px; line-height: 1; }
  .stat-card.s1 .stat-value { color: var(--accent); }
  .stat-card.s2 .stat-value { color: #b03060; }
  .stat-card.s3 .stat-value { color: var(--success); }
  .stat-card.s4 .stat-value { color: var(--blue); }
  .stat-sub { font-size: 10.5px; color: var(--muted); margin-top: 4px; }

  /* clickable stat cards */
  .stat-card.clickable { cursor: pointer; transition: box-shadow 0.18s, border-color 0.18s; }
  .stat-card.clickable:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.12); border-color: #b0c0d8; }
  .stat-card.s2.active-filter { border-color: #b03060; box-shadow: 0 0 0 2px rgba(176,48,96,0.15); }
  .stat-card.s3.active-filter { border-color: var(--success); box-shadow: 0 0 0 2px rgba(0,153,101,0.15); }

  .page-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
  .ptitle { display: flex; align-items: center; gap: 10px; }
  .ptitle-bar { width: 4px; height: 26px; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .ptitle h2 { font-size: 17px; font-weight: 600; }
  .ptitle p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none; }
  .search-box { background: rgba(0,0,0,0.04); border: 1px solid var(--border); border-radius: 7px; padding: 8px 14px 8px 36px; color: var(--white); font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px; outline: none; width: 240px; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--teal); }
  .search-box::placeholder { color: var(--muted); }
  .btn { background: transparent; border: 1px solid var(--accent); border-radius: 7px; padding: 8px 16px; color: var(--accent); font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn:hover { background: rgba(244,163,0,0.1); }

  /* Pending filter button */
  .btn-pending { background: transparent; border: 1px solid #b03060; border-radius: 7px; padding: 8px 16px; color: #b03060; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-pending:hover { background: rgba(176,48,96,0.08); }
  .btn-pending.active { background: rgba(176,48,96,0.12); border-color: #8a1a40; color: #8a1a40; }
  .filter-badge { display: inline-block; background: rgba(176,48,96,0.15); border: 1px solid rgba(176,48,96,0.3); border-radius: 5px; padding: 3px 10px; font-size: 11px; color: #b03060; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .filter-badge.hidden { display: none; }

  .pagination-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .page-info { font-size: 11.5px; color: var(--muted); }
  .page-info span { color: var(--teal); font-weight: 500; }
  .page-btns { display: flex; gap: 5px; align-items: center; }
  .page-btn { background: rgba(0,0,0,0.04); border: 1px solid var(--border); border-radius: 5px; padding: 5px 11px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; }
  .page-btn:hover { border-color: var(--teal); color: var(--teal); }
  .page-btn.active { background: rgba(0,191,191,0.15); border-color: var(--teal); color: var(--teal); font-weight: 600; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .per-page-select { background: rgba(0,0,0,0.04); border: 1px solid var(--border); border-radius: 5px; padding: 5px 10px; color: var(--muted); font-size: 12px; font-family: 'IBM Plex Mono', monospace; outline: none; cursor: pointer; }

  .table-wrap { background: var(--navy-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  thead tr { background: linear-gradient(90deg, #eef1f8 0%, #e6eaf4 100%); border-bottom: 2px solid var(--accent); }
  th { padding: 12px 16px; text-align: left; font-size: 10.5px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; border-right: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.15s; }
  th:hover { background: rgba(244,163,0,0.06); }
  th:last-child { border-right: none; }
  th .si { font-size: 9px; opacity: 0.4; margin-left: 4px; }
  th.sorted { color: var(--teal); }
  tbody tr { border-bottom: 1px solid rgba(208,219,232,0.7); transition: background 0.12s; }
  tbody tr:nth-child(even) { background: rgba(244,246,250,0.6); }
  tbody tr:hover { background: rgba(0,122,122,0.05); }
  td { padding: 11px 16px; vertical-align: middle; border-right: 1px solid rgba(208,219,232,0.5); font-size: 12.5px; }
  td:last-child { border-right: none; }

  /* Pending row highlight */
  tbody tr.pending-row { background: rgba(176,48,96,0.04) !important; }
  tbody tr.pending-row:hover { background: rgba(176,48,96,0.08) !important; }

  .vname { font-weight: 600; color: #1a2a3a; }
  .vcode-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--teal); margin-top: 2px; display: block; }
  .loc-badge { display: inline-block; background: rgba(26,111,191,0.08); border: 1px solid rgba(26,111,191,0.2); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--blue); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
  .special-code { background: rgba(244,163,0,0.1); border-color: rgba(244,163,0,0.3); color: var(--accent); }
  .area-val { color: #1a5fa0; font-family: 'IBM Plex Mono', monospace; text-align: right; }
  .idx { color: rgba(106,130,160,0.45); font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; text-align: center; }
  .dup-tag { display: inline-block; background: rgba(224,92,26,0.15); border: 1px solid rgba(224,92,26,0.3); border-radius: 3px; padding: 1px 5px; font-size: 9px; color: var(--accent2); margin-left: 5px; vertical-align: middle; font-weight: 600; letter-spacing: 0.04em; }
  .pending-tag { display: inline-block; background: rgba(176,48,96,0.12); border: 1px solid rgba(176,48,96,0.3); border-radius: 3px; padding: 1px 5px; font-size: 9px; color: #b03060; margin-left: 5px; vertical-align: middle; font-weight: 600; letter-spacing: 0.04em; }
  .loc-text { color: #6a82a0; font-size: 12px; }
  .loc-code { color: var(--border); }
  .no-results { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* Input columns */
  .inp {
    background: rgba(0,0,0,0.03);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11.5px;
    width: 100%;
    min-width: 110px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .inp:focus { border-color: var(--teal); background: rgba(0,191,191,0.06); }
  .inp::placeholder { color: rgba(106,130,160,0.5); font-size: 10.5px; }
  .inp.inp-num { min-width: 70px; text-align: center; }
  .inp.inp-pop { min-width: 90px; }
  .inp.inp-hamlet { min-width: 140px; }
  .inp.inp-landmark { min-width: 130px; border-color: rgba(244,163,0,0.25); }
  .inp.inp-landmark:focus { border-color: var(--accent); background: rgba(244,163,0,0.05); }
  .inp.inp-patwari { min-width: 120px; border-color: rgba(0,201,141,0.25); }
  .inp.inp-patwari:focus { border-color: var(--success); background: rgba(0,201,141,0.05); }
  .inp.filled { border-color: rgba(0,191,191,0.4); }

  th.input-th { color: #c0d0e8; font-size: 10px; }
  th.input-th.landmark-th { color: var(--accent2); }
  th.input-th.patwari-th { color: var(--success); }
  th.save-th { color: var(--teal); font-size: 10px; text-align: center; }
  th.time-th { color: #a0b4d0; font-size: 10px; text-align: center; }
  th.unlock-th { color: #c04b0e; font-size: 10px; text-align: center; }
  td.unlock-td { text-align: center; vertical-align: middle; }
  .unlock-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px;
    background: rgba(192,75,14,0.08);
    border: 1px solid rgba(192,75,14,0.35);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--accent2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    min-width: 80px;
  }
  .unlock-btn:hover { background: rgba(192,75,14,0.18); border-color: var(--accent2); transform: scale(1.04); }
  .unlock-na { color: rgba(106,130,160,0.3); font-size: 13px; }

  /* Locked row */
  tr.locked td { background: rgba(0,201,141,0.04) !important; }
  tr.locked:hover td { background: rgba(0,201,141,0.07) !important; }
  .inp:disabled {
    background: rgba(0,201,141,0.06) !important;
    border-color: rgba(0,201,141,0.2) !important;
    color: #a0d4c0 !important;
    cursor: not-allowed !important;
    opacity: 0.85;
  }
  .lock-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(0,201,141,0.12);
    border: 1px solid rgba(0,201,141,0.3);
    border-radius: 5px;
    padding: 5px 11px;
    color: var(--success);
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Timestamp cell */
  .ts-cell {
    text-align: center;
    min-width: 110px;
  }
  .ts-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--teal);
    display: block;
  }
  .ts-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }
  .ts-empty {
    color: rgba(106,130,160,0.3);
    font-size: 11px;
    font-style: italic;
  }

  /* Per-row save button */
  .row-save-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 5px;
    background: rgba(0,191,191,0.1);
    border: 1px solid rgba(0,191,191,0.35);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--teal);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    min-width: 80px;
  }
  .row-save-btn:hover { background: rgba(0,191,191,0.22); border-color: var(--teal); transform: scale(1.04); }
  .row-save-btn.saved {
    background: rgba(0,201,141,0.15);
    border-color: rgba(0,201,141,0.5);
    color: var(--success);
  }
  td.save-td { text-align: center; vertical-align: middle; }

  .save-btn {
    background: linear-gradient(135deg, var(--teal), #006e6e);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }
  .save-btn:hover { opacity: 0.85; }
  .saved-toast {
    display: none;
    background: rgba(0,201,141,0.15);
    border: 1px solid rgba(0,201,141,0.3);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 11.5px;
    color: var(--success);
  }

  .table-footer { padding: 11px 18px; border-top: 1px solid var(--border); background: rgba(244,246,250,0.7); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .table-footer p { font-size: 10.5px; color: var(--muted); }
  .count-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--teal); background: rgba(0,191,191,0.1); border: 1px solid rgba(0,191,191,0.2); border-radius: 4px; padding: 3px 10px; white-space: nowrap; }

  footer { text-align: center; padding: 14px; font-size: 10.5px; color: rgba(106,130,160,0.4); border-top: 1px solid var(--border); letter-spacing: 0.04em; }
  footer span { color: var(--muted); }

  ::-webkit-scrollbar { height: 5px; width: 5px; }
  ::-webkit-scrollbar-track { background: #f0f2f5; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    header, main { padding-left: 14px; padding-right: 14px; }
    .search-box { width: 180px; }
  }

  /* PRINT MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
  .modal p  { font-size: 11.5px; color: var(--muted); margin-bottom: 20px; }
  .modal-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .modal-opt {
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .modal-opt:hover { border-color: var(--teal); background: rgba(0,191,191,0.06); }
  .modal-opt input[type=radio] { accent-color: var(--teal); width: 16px; height: 16px; }
  .modal-opt-label { font-size: 13px; font-weight: 500; color: var(--white); }
  .modal-opt-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel { background: transparent; border: 1px solid var(--border); border-radius: 7px; padding: 8px 18px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; }
  .modal-cancel:hover { border-color: var(--muted); }
  .modal-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 7px; padding: 8px 22px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; }
  .modal-confirm:hover { opacity: 0.9; }

  /* PRINT STYLES */
  @media print {
    header, .breadcrumb, .stats-row, .page-title-row .controls,
    .pagination-row, .table-footer, footer, .modal-overlay { display: none !important; }
    body { background: #fff !important; color: #000 !important; font-size: 10pt; }
    main { padding: 0 !important; }
    .print-header { display: block !important; }
    table { min-width: unset !important; font-size: 8.5pt; }
    th { background: #1a3a6e !important; color: #fff !important; padding: 6px 8px !important; font-size: 8pt !important; }
    td { padding: 5px 8px !important; border: 1px solid #ccc !important; color: #000 !important; }
    tbody tr:nth-child(even) { background: #f5f7fa !important; }
    .inp { border: 1px solid #aaa !important; background: #fff !important; color: #000 !important; font-size: 8.5pt !important; padding: 2px 4px !important; }
    .vname { color: #000 !important; }
    .vcode-sub { color: #555 !important; }
    .loc-text, .area-val { color: #333 !important; }
    .loc-badge { border: 1px solid #aaa !important; color: #333 !important; background: #eee !important; }
    .table-wrap { box-shadow: none !important; border: 1px solid #ccc !important; border-radius: 0 !important; }
    .dup-tag { background: #ffe0cc !important; color: #c04000 !important; }
    .ptitle h2 { color: #000 !important; font-size: 14pt !important; }
    .ptitle p  { color: #555 !important; }
    .ptitle-bar { background: #1a3a6e !important; }
  }
  .print-header { display: none; }

  /* VIEW DATA MODAL */
  .view-modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }
  .view-modal h3 { font-size: 15px; font-weight: 600; color: var(--teal); margin-bottom: 4px; }
  .view-modal .vm-sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; font-family: 'IBM Plex Mono', monospace; }
  .vm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
  .vm-field { background: #f4f6fa; border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; }
  .vm-field-label { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .vm-field-val { font-size: 13px; font-weight: 500; color: var(--white); font-family: 'IBM Plex Mono', monospace; word-break: break-word; }
  .vm-field-val.empty { color: rgba(106,130,160,0.4); font-style:
